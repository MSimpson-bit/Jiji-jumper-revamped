<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; color: white; z-index: 9999; 
        }
        h1 { font-size: 50px; color: #00ffff; text-shadow: 0 0 15px #00ffff; margin-bottom: 20px; }
        .btn { 
            padding: 15px 30px; margin: 10px; font-size: 22px; cursor: pointer;
            background: #111; border: 3px solid #00ffff; color: white;
            width: 300px; text-align: center; border-radius: 12px;
            display: block; position: relative; z-index: 10000;
        }
        .btn:hover { background: #00ffff; color: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ffff; font-size: 32px; font-weight: bold; z-index: 10; display: none;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="overlay">
    <h1>JIJI JUMPER</h1>
    <button class="btn" onclick="startGame(1)">LEVEL 1: STEREO</button>
    <button class="btn" onclick="startGame(2)">LEVEL 2: ON TRACK</button>
    <button class="btn" onclick="startGame(3)" style="border-color:#ff0066; color:#ff0066;">LEVEL 3: IMPOSSIBLE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const GROUND_Y = canvas.height / 2 + 100;
let gameState = "MENU"; 
let speed, gravity = 0.9, isHolding = false, mode = "cube"; 
let currentLevel = [], particles = [], distanceTraveled = 0, finishLineX = 0;

const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 

let player = { x: 150, y: GROUND_Y - 42, size: 42, velY: 0, rotation: 0, onGround: false };

// --- LONG HAND-CRAFTED LEVELS ---
// Spikes are placed every few hundred pixels. The 'win' tag is at the very end.
const levelData = {
    1: [
        {x: 800}, {x: 1200}, {x: 1500}, {x: 1900, type:'portal'}, 
        {x: 2400}, {x: 2700}, {x: 3000}, {x: 3300, type:'portal'},
        {x: 3800}, {x: 4200}, {x: 4600}, {x: 5000, type:'portal'},
        {x: 5500}, {x: 6000}, {x: 6500}, {x: 7000}, {x: 8000, type:'win'}
    ],
    2: [
        {x: 600}, {x: 900}, {x: 1200, type:'portal'}, {x: 1600}, {x: 1900},
        {x: 2200, type:'portal'}, {x: 2600}, {x: 2900, type:'portal'},
        {x: 3400}, {x: 3800}, {x: 4200}, {x: 4600, type:'portal'},
        {x: 5200}, {x: 5600}, {x: 6000}, {x: 7000, type:'portal'},
        {x: 8000}, {x: 9000}, {x: 10000, type:'win'}
    ],
    3: [
        {x: 500}, {x: 800}, {x: 1000, type:'portal'}, {x: 1300}, {x: 1500}, 
        {x: 1800, type:'portal'}, {x: 2100}, {x: 2400}, {x: 2700, type:'portal'},
        {x: 3100}, {x: 3400}, {x: 3700}, {x: 4000, type:'portal'},
        {x: 4500}, {x: 4800}, {x: 5100}, {x: 5500, type:'portal'},
        {x: 6000}, {x: 6500}, {x: 7000}, {x: 7500}, {x: 8000, type:'portal'},
        {x: 9000}, {x: 10000}, {x: 11000}, {x: 12000}, {x: 15000, type:'win'}
    ]
};

function startGame(num) {
    gameState = "PLAY";
    overlay.style.display = "none";
    ui.style.display = "block";
    
    distanceTraveled = 0;
    mode = "cube";
    player.y = GROUND_Y - 42;
    player.velY = 0;
    player.rotation = 0;
    particles = [];

    speed = num === 1 ? 9 : (num === 2 ? 12 : 16);
    
    // Deep copy level and find the finish line X
    currentLevel = levelData[num].map(obj => {
        if (obj.type === 'win') finishLineX = obj.x;
        return { ...obj, type: obj.type || 'spike' };
    });
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (gameState === "PLAY") {
        drawWorld();
        handlePhysics();
        
        distanceTraveled += speed;

        // Accurate Progress Calculation: (Current Distance / Total Distance) * 100
        let realPercent = Math.floor((distanceTraveled / finishLineX) * 100);
        ui.innerText = `${Math.min(100, realPercent)}%`;

        currentLevel.forEach(obj => {
            let screenX = obj.x - distanceTraveled + player.x;

            if (obj.type === 'spike') {
                drawSpike(screenX);
                if (checkCollision(screenX, 44, 45)) die();
            } else if (obj.type === 'portal') {
                drawPortal(screenX);
                if (Math.abs(player.x - screenX) < 30) {
                    mode = (mode === "cube") ? "ship" : "cube";
                    obj.x = -5000; // Consume portal
                }
            } else if (obj.type === 'win') {
                if (screenX < player.x) win();
            }
        });

        updateParticles();
        drawParticles();
        drawPlayer();
    }
    requestAnimationFrame(update);
}

function handlePhysics() {
    if (mode === "cube") {
        player.velY += gravity;
        if (player.y > GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velY = 0;
            player.onGround = true;
            if (isHolding) jump();
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 6;
        }
    } else {
        player.velY += isHolding ? -0.
    overlay.style.display = "flex";
}
