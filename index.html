<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0a0a0a; color: white; z-index: 9999; 
        }
        h1 { font-size: 50px; color: #00ffff; text-shadow: 0 0 15px #00ffff; margin-bottom: 20px; }
        .btn { 
            padding: 15px 30px; margin: 10px; font-size: 22px; cursor: pointer;
            background: #111; border: 3px solid #00ffff; color: white;
            width: 300px; text-align: center; border-radius: 12px;
            display: block; position: relative; z-index: 10000;
        }
        .btn:hover { background: #00ffff; color: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ffff; font-size: 32px; font-weight: bold; z-index: 10; display: none;
        }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="overlay">
    <h1>JIJI JUMPER</h1>
    <button class="btn" onclick="startGame(1)">LEVEL 1: BLOCKS</button>
    <button class="btn" onclick="startGame(2)">LEVEL 2: CLIMBER</button>
    <button class="btn" onclick="startGame(3)" style="border-color:#ff0066; color:#ff0066;">LEVEL 3: IMPOSSIBLE</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const GROUND_Y = canvas.height / 2 + 100;
let gameState = "MENU"; 
let speed, gravity = 0.9, isHolding = false, mode = "cube"; 
let currentLevel = [], particles = [], distanceTraveled = 0, levelLength = 0;

const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 

let player = { x: 150, y: GROUND_Y - 42, size: 42, velY: 0, rotation: 0, onGround: false };

// --- LEVEL DATA WITH BLOCKS ---
// t: 's' (spike), 'p' (portal), 'b' (block)
// h: height offset from ground (for blocks)
const levelData = {
    1: { length: 12000, speed: 9, obstacles: [
        {x: 800, t:'s'}, {x: 1200, t:'b', h: 45}, {x: 1245, t:'b', h: 45}, // A small platform
        {x: 1800, t:'p'}, {x: 2400, t:'b', h: 100}, {x: 2445, t:'b', h: 100},
        {x: 3500, t:'s'}, {x: 3545, t:'s'}, {x: 4000, t:'b', h: 60}, {x: 4200, t:'s'},
        {x: 5500, t:'p'}, {x: 6500, t:'b', h: 120}, {x: 8000, t:'s'}
    ]},
    2: { length: 18000, speed: 12, obstacles: [
        {x: 600, t:'b', h: 45}, {x: 800, t:'b', h: 90}, {x: 1000, t:'b', h: 135}, // Stairs
        {x: 1500, t:'p'}, {x: 2000, t:'s'}, {x: 2500, t:'b', h: 100},
        {x: 3500, t:'p'}, {x: 4500, t:'b', h: 50}, {x: 4545, t:'s'}
    ]},
    3: { length: 30000, speed: 17, obstacles: [
        {x: 500, t:'s'}, {x: 800, t:'b', h: 50}, {x: 1000, t:'s'}, {x: 1200, t:'p'}
    ]}
};

function startGame(num) {
    gameState = "PLAY";
    overlay.style.display = "none";
    ui.style.display = "block";
    distanceTraveled = 0;
    mode = "cube";
    player.y = GROUND_Y - 42;
    player.velY = 0;
    particles = [];
    const data = levelData[num];
    speed = data.speed;
    levelLength = data.length;
    currentLevel = data.obstacles.map(o => ({ x: o.x, y: GROUND_Y - (o.h || 0), type: o.t === 'p' ? 'portal' : (o.t === 'b' ? 'block' : 'spike'), active: true }));
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === "PLAY") {
        drawWorld();
        handlePhysics();
        distanceTraveled += speed;
        ui.innerText = `${Math.min(100, Math.floor((distanceTraveled / levelLength) * 100))}%`;

        if (distanceTraveled >= levelLength) win();

        currentLevel.forEach(obj => {
            if (!obj.active) return;
            let screenX = obj.x - distanceTraveled + player.x;

            if (obj.type === 'spike') {
                drawSpike(screenX);
                if (checkCollision(screenX, 44, 45, obj.y)) die();
            } else if (obj.type === 'block') {
                drawBlock(screenX, obj.y);
                checkBlockCollision(screenX, obj.y);
            } else if (obj.type === 'portal') {
                drawPortal(screenX);
                if (Math.abs(player.x - screenX) < 30) {
                    mode = (mode === "cube") ? "ship" : "cube";
                    obj.active = false;
                }
            }
        });
        updateParticles(); drawParticles(); drawPlayer();
    }
    requestAnimationFrame(update);
}

function handlePhysics() {
    if (mode === "cube") {
        player.velY += gravity;
        player.y += player.velY;
        if (player.y > GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velY = 0;
            player.onGround = true;
            if (isHolding) jump();
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 6;
        }
    } else { // SHIP
        player.velY += isHolding ? -0.8 : 0.8;
        player.y += player.velY;
        player.rotation = player.velY * 2;
        if (player.y > GROUND_Y - player.size || player.y < 0) die();
    }
}

function checkBlockCollision(bx, by) {
    const p = player;
    // Check if landing on TOP
    if (p.x + p.size > bx && p.x < bx + 45) {
        if (p.velY >= 0 && p.y + p.size >= by && p.y + p.size <=
