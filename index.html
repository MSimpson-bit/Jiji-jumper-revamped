<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #060606; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%); color: white;
        }
        h1 { font-size: 60px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 30px; }
        .btn { 
            padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer;
            background: rgba(0,255,255,0.1); border: 2px solid #00ffff; color: white;
            transition: 0.3s; width: 250px; text-align: center; border-radius: 8px;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 20px #00ffff; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ffff; font-size: 24px; font-weight: bold; pointer-events: none; display: none;
        }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="overlay">
    <h1>JIJI JUMPER</h1>
    <div class="btn" onclick="startGame(1)">LEVEL 1: STEREO</div>
    <div class="btn" onclick="startGame(2)">LEVEL 2: ON TRACK</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const GROUND_Y = canvas.height / 2 + 100;
let gameState = "MENU"; 
let speed = 9;
let gravity = 0.9;
let isHolding = false;
let progress = 0;
let mode = "cube"; 
let currentLevel = [];

const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 

let player = { x: 150, y: GROUND_Y - 42, size: 42, velY: 0, rotation: 0, onGround: false };
let particles = [];

// --- HAND-CRAFTED LEVELS (No Randomization) ---
const levels = {
    1: [
        {x: 800, type: 'spike'}, {x: 1100, type: 'spike'}, 
        {x: 1400, type: 'spike'}, {x: 1445, type: 'spike'}, // Double spike
        {x: 1800, type: 'portal'}, // Turns into ship
        {x: 2200, type: 'spike'}, {x: 2400, type: 'spike'}, {x: 2600, type: 'spike'},
        {x: 3000, type: 'spike'}, {x: 3045, type: 'spike'}, {x: 3090, type: 'spike'}, // Triple spike!
        {x: 4000, type: 'win'} 
    ],
    2: [
        {x: 600, type: 'spike'}, {x: 800, type: 'spike'}, {x: 1000, type: 'spike'},
        {x: 1300, type: 'spike'}, {x: 1345, type: 'spike'},
        {x: 1700, type: 'spike'}, {x: 2000, type: 'spike'},
        {x: 2300, type: 'spike'}, {x: 2345, type: 'spike'}, {x: 2390, type: 'spike'},
        {x: 2800, type: 'portal'},
        {x: 3200, type: 'spike'}, {x: 3500, type: 'spike'},
        {x: 5000, type: 'win'}
    ]
};

function startGame(num) {
    gameState = "PLAY";
    overlay.style.display = "none";
    ui.style.display = "block";
    progress = 0;
    mode = "cube";
    player.y = GROUND_Y - 42;
    player.velY = 0;
    player.rotation = 0;
    
    // Copy the level so we don't change the original
    currentLevel = JSON.parse(JSON.stringify(levels[num]));
    speed = num === 1 ? 9 : 11; 
}

function update() {
    if (gameState === "MENU") return requestAnimationFrame(update);
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawWorld();

    if (gameState === "PLAY") {
        handlePhysics();
        
        let furthestX = 0;
        currentLevel.forEach(obj => {
            obj.x -= speed;
            furthestX = Math.max(furthestX, obj.x);

            if (obj.type === 'spike') {
                drawSpike(obj.x);
                if (checkCollision(obj.x, 44, 45)) die();
            } else if (obj.type === 'portal') {
                drawPortal(obj.x);
                if (Math.abs(player.x - obj.x) < 20) mode = "ship";
            } else if (obj.type === 'win' && obj.x < player.x) {
                win();
            }
        });

        // Simple progress bar based on distance
        progress += 0.05; 
        ui.innerText = `${Math.min(100, Math.floor(progress))}%`;
    }

    updateParticles();
    drawParticles();
    drawPlayer();
    requestAnimationFrame(update);
}

function handlePhysics() {
    if (mode === "cube") {
        player.velY += gravity;
        if (player.y > GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velY = 0;
            player.onGround = true;
            if (isHolding) jump();
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 6;
        }
    } else {
        player.velY += isHolding ? -0.7 : 0.7;
        player.rotation = player.velY * 2;
        if (player.y > GROUND_Y - player.size || player.y < 0) die();
    }
    player.y += player.velY;
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rotation * Math.PI / 180);
    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
    if (playerImg.complete) ctx.drawImage(playerImg, -player.size/2, -player.size/2, player.size, player.size);
    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
    ctx.restore();
}

function drawSpike(x) {
    ctx.fillStyle = "#ff0066";
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x+22, GROUND_Y-45); ctx.lineTo(x+44, GROUND_Y); ctx.fill();
}

function drawPortal(x) {
    ctx.fillStyle = "#00ff00"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ff00";
    ctx.fillRect(x, GROUND_Y - 250, 40, 250);
}

function drawWorld() {
    ctx.strokeStyle = "#1a1a1a";
    for(let i = -(progress*20%60); i < canvas.width; i+=60) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
}

function checkCollision(ox, ow, oh) {
    const m = 10;
    return (player.x + player.size - m > ox + m && player.x + m < ox + ow - m && player.y + player.size - m > GROUND_Y - oh);
}

function jump() { if (player.onGround) { player.velY = -15.5; player.onGround = false; } }

function die() {
    if (gameState === "DEAD") return;
    gameState = "DEAD";
    createExplosion(player
