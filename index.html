<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper</title>
    <style>
        body { margin: 0; background: #000; color: #00ffff; font-family: 'Courier New', monospace; overflow: hidden; text-align: center; }
        #menu { position: absolute; width: 100%; top: 20%; z-index: 100; }
        h1 { font-size: 50px; text-shadow: 0 0 10px #00ffff; }
        .instruction { font-size: 24px; margin: 20px; color: white; }
        canvas { display: none; position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 10px; width: 100%; font-size: 30px; display: none; }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="menu">
    <h1>JIJI JUMPER</h1>
    <p class="instruction">PRESS A KEY TO START:</p>
    <p class="instruction" style="color: #00ffff;"> - LEVEL 1: STEREO</p>
    <p class="instruction" style="color: #00ffff;"> - LEVEL 2: ON TRACK</p>
    <p class="instruction" style="color: #ff0066;"> - LEVEL 3: IMPOSSIBLE</p>
    <p style="margin-top: 40px; color: #555;">(Or Click/Tap anywhere to start Level 1)</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const ui = document.getElementById("ui");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let isPlaying = false;
let distance = 0, totalLength = 10000, speed = 10;
let player = { x: 150, y: 0, size: 40, vY: 0, mode: "cube" };
let obstacles = [];
const GROUND = canvas.height / 2 + 100;

// Level Setup
const levelData = {
    1: { len: 15000, spd: 9, obs: [{x:1000, t:'s'}, {x:2000, t:'b'}, {x:3000, t:'p'}] },
    2: { len: 25000, spd: 13, obs: [{x:800, t:'b'}, {x:1500, t:'p'}, {x:2200, t:'s'}] },
    3: { len: 45000, spd: 19, obs: [{x:500, t:'s'}, {x:900, t:'p'}, {x:1500, t:'s'}] }
};

function start(levelNum) {
    const data = levelData[levelNum] || levelData;
    speed = data.spd;
    totalLength = data.len;
    obstacles = data.obs;
    
    menu.style.display = "none";
    canvas.style.display = "block";
    ui.style.display = "block";
    
    player.y = GROUND - 40;
    isPlaying = true;
    animate();
}

// FAIL-SAFE INPUT: Keyboard
window.addEventListener("keydown", (e) => {
    if (!isPlaying) {
        if (e.key === "1") start(1);
        if (e.key === "2") start(2);
        if (e.key === "3") start(3);
    } else {
        if (e.code === "Space" || e.code === "ArrowUp") jump();
    }
});

// FAIL-SAFE INPUT: Mouse/Touch (Starts Level 1 if in Menu)
window.addEventListener("mousedown", () => {
    if (!isPlaying) start(1);
    else jump();
});

function jump() {
    if (player.mode === "cube" && player.y >= GROUND - 40) {
        player.vY = -16;
    }
}

function animate() {
    if (!isPlaying) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Physics
    if (player.mode === "cube") {
        player.vY += 0.9;
        player.y += player.vY;
        if (player.y > GROUND - 40) { player.y = GROUND - 40; player.vY = 0; }
    }
    
    distance += speed;
    ui.innerText = Math.floor((distance / totalLength) * 100) + "%";
    
    if (distance >= totalLength) { alert("WIN!"); location.reload(); }

    // Draw Ground
    ctx.fillStyle = "#111"; ctx.fillRect(0, GROUND, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ffff"; ctx.strokeRect(0, GROUND, canvas.width, 2);

    // Draw Obstacles
    obstacles.forEach(o => {
        let sx = o.x - distance + player.x;
        if (o.t === 's') {
            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.moveTo(sx, GROUND); ctx.lineTo(sx+20, GROUND-40); ctx.lineTo(sx+40, GROUND); ctx.fill();
            if (sx < player.x + 30 && sx + 40 > player.x && player.y > GROUND - 40) location.reload();
        }
    });

    // Draw Player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.size, player.size);
    
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
