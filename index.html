<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper: Official</title>
    <style>
        body { margin: 0; overflow: hidden; background: #060606; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); color: white; transition: 0.5s;
        }
        h1 { font-size: 60px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 10px; }
        .btn { 
            padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer;
            background: transparent; border: 2px solid #00ffff; color: white;
            transition: 0.3s; width: 200px; text-align: center;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 20px #00ffff; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ffff; font-size: 24px; font-weight: bold; pointer-events: none;
            display: none; /* Hidden until game starts */
        }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="overlay">
    <h1>JIJI JUMPER</h1>
    <p>Select your challenge:</p>
    <div class="btn" onclick="startGame('stereo')">Level 1: Stereo</div>
    <div class="btn" onclick="startGame('backontrack')">Level 2: On Track</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- CONFIG ---
const GROUND_Y = canvas.height / 2 + 100;
let gameState = "MENU"; 
let speed = 9;
let gravity = 0.9;
let isHolding = false;
let progress = 0;
let mode = "cube"; // cube or ship

// --- IMAGES ---
const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 

// --- PLAYER ---
let player = { x: 150, y: GROUND_Y - 42, size: 42, velY: 0, rotation: 0, onGround: false };

// --- LEVELS ---
let obstacles = [];
let particles = [];

function startGame(level) {
    gameState = "PLAY";
    overlay.style.display = "none";
    ui.style.display = "block";
    progress = 0;
    mode = "cube";
    player.y = GROUND_Y - 42;
    player.velY = 0;

    if (level === 'stereo') {
        speed = 9;
        obstacles = [
            {x: 800, type: 'spike'}, {x: 1200, type: 'spike'}, {x: 1245, type: 'spike'},
            {x: 1800, type: 'portal', to: 'ship'}, {x: 2200, type: 'spike'}, {x: 2600, type: 'spike'}
        ];
    } else {
        speed = 11; // Harder level
        obstacles = [{x: 700, type: 'spike'}, {x: 850, type: 'spike'}, {x: 1000, type: 'spike'}];
    }
}

// --- CORE GAME LOOP ---
function update() {
    if (gameState === "MENU") return requestAnimationFrame(update);
    if (gameState === "DEAD") {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        drawWorld();
        updateParticles();
        drawParticles();
        return requestAnimationFrame(update);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Physics Logic
    if (mode === "cube") {
        player.velY += gravity;
        if (player.y > GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velY = 0;
            player.onGround = true;
            if (isHolding) jump();
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 6;
        }
    } else { // SHIP MODE
        player.velY += isHolding ? -0.5 : 0.6; // Fly up on hold
        player.rotation = player.velY * 2; // Lean into flight
        if (player.y > GROUND_Y - player.size) die(); // Ship dies on floor
        if (player.y < 50) player.y = 50; // Ceiling
    }
    
    player.y += player.velY;
    progress += 0.05;
    ui.innerText = `${Math.min(100, Math.floor(progress))}%`;

    drawWorld();
    
    // Handle Obstacles
    obstacles.forEach(obj => {
        obj.x -= speed;
        if (obj.type === 'spike') {
            drawSpike(obj.x);
            if (checkCollision(obj.x, 44, 45)) die();
        } else if (obj.type === 'portal') {
            drawPortal(obj.x);
            if (Math.abs(player.x - obj.x) < 20) mode = "ship";
        }
    });

    drawPlayer();
    requestAnimationFrame(update);
}

// --- DRAWING FUNCTIONS ---
function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rotation * Math.PI / 180);
    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
    if (playerImg.complete) ctx.drawImage(playerImg, -player.size/2, -player.size/2, player.size, player.size);
    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
    ctx.restore();
}

function drawSpike(x) {
    ctx.fillStyle = "#ff0066";
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x+22, GROUND_Y-45); ctx.lineTo(x+44, GROUND_Y); ctx.fill();
}

function drawPortal(x) {
    ctx.fillStyle = "#00ff00"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ff00";
    ctx.fillRect(x, GROUND_Y - 150, 30, 150);
}

function drawWorld() {
    ctx.strokeStyle = "#1a1a1a";
    for(let i = -(progress*20%60); i < canvas.width; i+=60) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    ctx.fillStyle = "#0a0a0a"; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
}

function checkCollision(ox, ow, oh) {
    const m = 8;
    return (player.x + player.size - m > ox + m && player.x + m < ox + ow - m && player.y + player.size - m > GROUND_Y - oh);
}

function jump() { if (player.onGround) { player.velY = -15.5; player.onGround = false; } }

function die() {
    if (gameState === "DEAD") return;
    gameState = "DEAD";
    createExplosion(player.x, player.y);
    setTimeout(() => { location.reload(); }, 1000);
}

function createExplosion(x, y) {
    for (let i = 0; i < 20; i++) particles.push({ x, y, vx:(Math.random()-0.5)*15, vy:(Math.random()-0.5)*15, size:Math.random()*8, life:1.0 });
}
function updateParticles() { particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life-=0.02; }); }
function drawParticles() { particles.forEach(p => { ctx.globalAlpha=p.life; ctx.fillStyle="cyan"; ctx.fillRect(p.x,p.y,p.size,p.size); }); ctx.globalAlpha=1; }

// --- INPUTS ---
window.addEventListener("keydown", (e) => { if(e.code === "Space") { isHolding = true; jump(); } });
window.addEventListener("keyup", (e) => { if(e.code === "Space") isHolding = false; });
window.addEventListener("mousedown", () => { isHolding = true; jump(); });
window.addEventListener("mouseup", () => isHolding = false);

update();
</script>
</body>
</html>
