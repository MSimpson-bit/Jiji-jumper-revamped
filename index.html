<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%); color: white; z-index: 10;
        }
        h1 { font-size: 60px; color: #00ffff; text-shadow: 0 0 20px #00ffff; margin-bottom: 30px; }
        .btn { 
            padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer;
            background: rgba(0,255,255,0.1); border: 2px solid #00ffff; color: white;
            transition: 0.3s; width: 250px; text-align: center; border-radius: 8px;
        }
        .btn:hover { background: #00ffff; color: black; box-shadow: 0 0 20px #00ffff; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #00ffff; font-size: 24px; font-weight: bold; pointer-events: none; display: none;
        }
    </style>
</head>
<body>

<div id="ui">0%</div>

<div id="overlay">
    <h1>JIJI JUMPER</h1>
    <div class="btn" onclick="startGame(1)">LEVEL 1: STEREO</div>
    <div class="btn" onclick="startGame(2)">LEVEL 2: ON TRACK</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const overlay = document.getElementById("overlay");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const GROUND_Y = canvas.height / 2 + 100;
let gameState = "MENU"; 
let speed = 9;
let gravity = 0.9;
let isHolding = false;
let progress = 0;
let mode = "cube"; 
let currentLevel = [];
let particles = [];

const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 

let player = { x: 150, y: GROUND_Y - 42, size: 42, velY: 0, rotation: 0, onGround: false };

// --- FULL HAND-CRAFTED LEVELS ---
const levels = {
    1: [
        {x: 800}, {x: 1200}, {x: 1500}, {x: 1545}, {x: 1900, type:'portal'}, 
        {x: 2300}, {x: 2500}, {x: 2700}, {x: 2900}, {x: 3200, type:'portal'},
        {x: 3600}, {x: 3645}, {x: 3690}, {x: 4100}, {x: 4400}, {x: 4700},
        {x: 5000}, {x: 5045}, {x: 5400}, {x: 5800}, {x: 6200, type:'win'}
    ],
    2: [
        {x: 600}, {x: 750}, {x: 900}, {x: 1200, type:'portal'},
        {x: 1600}, {x: 1800}, {x: 1845}, {x: 2100}, {x: 2400},
        {x: 2700, type:'portal'}, {x: 3000}, {x: 3045}, {x: 3090},
        {x: 3500}, {x: 3800}, {x: 4100}, {x: 4400}, {x: 4800, type:'win'}
    ]
};

function startGame(num) {
    // Reset Everything
    gameState = "PLAY";
    overlay.style.display = "none";
    ui.style.display = "block";
    progress = 0;
    mode = "cube";
    player.y = GROUND_Y - 42;
    player.velY = 0;
    player.rotation = 0;
    particles = [];
    
    speed = num === 1 ? 9 : 12; 
    
    // Load objects and give them types if missing
    currentLevel = levels[num].map(obj => ({
        x: obj.x,
        type: obj.type || 'spike'
    }));
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawWorld();

    if (gameState === "PLAY") {
        handlePhysics();
        
        // Update and Draw Objects
        currentLevel.forEach(obj => {
            obj.x -= speed;

            if (obj.type === 'spike') {
                drawSpike(obj.x);
                if (checkCollision(obj.x, 44, 45)) die();
            } else if (obj.type === 'portal') {
                drawPortal(obj.x);
                if (Math.abs(player.x - obj.x) < 30) {
                    mode = (mode === "cube") ? "ship" : "cube";
                    obj.x = -5000; // Move portal away after use
                }
            } else if (obj.type === 'win') {
                if (obj.x < player.x) win();
            }
        });

        progress += 0.05; 
        ui.innerText = `${Math.min(100, Math.floor(progress))}%`;
    }

    updateParticles();
    drawParticles();
    drawPlayer();
    requestAnimationFrame(update);
}

function handlePhysics() {
    if (mode === "cube") {
        player.velY += gravity;
        if (player.y > GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size;
            player.velY = 0;
            player.onGround = true;
            if (isHolding) jump();
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.onGround = false;
            player.rotation += 6;
        }
    } else {
        player.velY += isHolding ? -0.8 : 0.8;
        player.rotation = player.velY * 2;
        if (player.y > GROUND_Y - player.size || player.y < 0) die();
    }
    player.y += player.velY;
}

function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rotation * Math.PI / 180);
    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffff";
    if (playerImg.complete) {
        ctx.drawImage(playerImg, -player.size/2, -player.size/2, player.size, player.size);
    } else {
        ctx.fillStyle = "cyan"; ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
    }
    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
    ctx.restore();
}

function drawSpike(x) {
    if (x < -100 || x > canvas.width + 100) return; // Optimization
    ctx.shadowBlur = 10; ctx.shadowColor = "#ff0066";
    ctx.fillStyle = "#ff0066";
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.lineTo(x+22, GROUND_Y-45); ctx.lineTo(x+44, GROUND_Y); ctx.fill();
    ctx.shadowBlur = 0;
}

function drawPortal(x) {
    ctx.fillStyle = mode === "cube" ? "#00ff00" : "#ff00ff";
    ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
    ctx.fillRect(x, GROUND_Y - 250, 40, 250);
    ctx.shadowBlur = 0;
}

function drawWorld() {
    // Grid
    ctx.strokeStyle = "#1a1a1a";
    let gridOffset = (progress * 25) % 60;
    for(let i = -gridOffset; i < canvas.width; i+=60) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    // Ground
    ctx.fillStyle = "#050505"; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
}

function checkCollision(ox, ow, oh) {
    const m = 12; // Hitbox margin
    return (player.x + player.size - m > ox + m && player.x + m < ox + ow - m && player.y + player.size - m > GROUND_Y - oh);
}

function jump() { if (player.onGround) { player.velY = -15.5; player.onGround = false; } }

function die() {
    if (gameState === "DEAD") return;
    gameState = "DEAD";
    createExplosion(player.x + 20, player.y + 20);
    setTimeout(() => { 
        gameState = "MENU";
        overlay.style.display = "flex";
        ui.style.display = "none";
    }, 1000);
}

function win() {
    gameState = "MENU";
    alert("LEVEL COMPLETE!");
    overlay.style.display = "flex";
}
