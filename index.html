<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiji Jumper Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #fff; }
        #menu { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 100; text-align: center;
        }
        h1 { font-size: 60px; color: #00ffff; text-shadow: 0 0 20px #00ffff; }
        .key-prompt { font-size: 24px; color: #fff; margin: 10px; border: 1px solid #444; padding: 15px; width: 350px; border-radius: 10px; }
        canvas { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 30px; z-index: 10; display: none; color: #00ffff; }
    </style>
</head>
<body>

<div id="ui">0% | ATTEMPT 1</div>

<div id="menu">
    <h1>JIJI JUMPER</h1>
    <div class="key-prompt">Press - Level 1</div>
    <div class="key-prompt">Press - Level 2</div>
    <div class="key-prompt">Press - Level 3</div>
    <p style="color: #555;">[Space] To Jump</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const ui = document.getElementById("ui");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let attempts = parseInt(localStorage.getItem('jijiAttempts')) || 1;
const GROUND_Y = canvas.height / 2 + 150;
const CEILING_Y = GROUND_Y - 450;

let isPlaying = false, bgColor = "#000";
let speed = 0, levelLength = 100000, distanceTraveled = 0;
let gravity = 0.98, isHolding = false, mode = "cube", bufferTimer = 0;
let currentLevel = [];

const playerImg = new Image();
playerImg.src = 'Jiji-jumper.jpeg'; 
let player = { x: 250, y: GROUND_Y - 48, size: 48, velY: 0, rotation: 0, onGround: false };

function generateDenseLevel(num) {
    let obs = [];
    let x = 1200;
    let len =[num-1];
    while (x < len - 2000) {
        let r = Math.random();
        if (r < 0.4) { obs.push({x: x, t:'s'}); x += 700; }
        else if (r < 0.7) { obs.push({x: x, t:'b', h: 50}); x += 600; }
        else { obs.push({x: x, t:'o', h: 150}); x += 800; }
        if (x % 5000 < 800) {
            obs.push({x: x, t:'p'});
            for(let i=0; i<4; i++) obs.push({x: x + 600 + (i*600), t:'rs'});
            x += 3000;
        }
    }
    return { len, obs };
}

function startGame(num) {
    // RESET EVERYTHING FIRST
    distanceTraveled = 0;
    mode = "cube";
    player.y = GROUND_Y - player.size;
    player.velY = 0;
    
    localStorage.setItem('jijiAttempts', ++attempts);
    const data = generateDenseLevel(num);
    const set = [{c:"#000814", s:10}, {c:"#051505", s:14}, {c:"#150505", s:20}][num-1];
    
    speed = set.s;
    levelLength = data.len;
    bgColor = set.c;
    currentLevel = data.obs.map(o => ({ x: o.x, y: GROUND_Y - (o.h || 0), type: o.t, active: true }));
    
    menu.style.display = "none";
    canvas.style.display = "block";
    ui.style.display = "block";
    isPlaying = true;
    update();
}

window.addEventListener("keydown", (e) => {
    if (!isPlaying) {
        if (e.key === "1") startGame(1);
        else if (e.key === "2") startGame(2);
        else if (e.key === "3") startGame(3);
    } else if (e.code === "Space") {
        isHolding = true;
        bufferTimer = 12;
    }
});

window.addEventListener("keyup", (e) => { if (e.code === "Space") isHolding = false; });
window.addEventListener("mousedown", () => { isHolding = true; bufferTimer = 12; });
window.addEventListener("mouseup", () => isHolding = false);

function update() {
    if (!isPlaying) return;

    ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height);
    distanceTraveled += speed;
    
    let progress = Math.floor((distanceTraveled / levelLength) * 100);
    ui.innerText = `${Math.min(100, progress)}% | ATTEMPT ${attempts}`;

    // --- WIN CONDITION CHECK ---
    if (distanceTraveled >= levelLength && progress >= 99) {
        win();
        return;
    }

    if (bufferTimer > 0) bufferTimer--;

    if (mode === "cube") {
        player.velY += gravity;
        player.y += player.velY;
        if (player.y >= GROUND_Y - player.size) {
            player.y = GROUND_Y - player.size; player.velY = 0; player.onGround = true;
            player.rotation = Math.round(player.rotation / 90) * 90;
            if (bufferTimer > 0 || isHolding) { player.velY = -18; player.onGround = false; bufferTimer = 0; }
        } else { player.onGround = false; player.rotation += 7; }
    } else {
        player.velY += isHolding ? -0.85 : 0.85;
        player.y += player.velY;
        player.rotation = player.velY * 2.5;
        if (player.y > GROUND_Y - player.size || player.y < CEILING_Y) die();
    }

    // Ground
    ctx.fillStyle = "#000"; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height);
    ctx.strokeStyle = "#00ffff"; ctx.lineWidth = 3; ctx.strokeRect(-10, GROUND_Y, canvas.width+20, 2);

    // Obstacles
    currentLevel.forEach(obj => {
        let sx = obj.x - distanceTraveled + player.x;
        if (sx < -200 || sx > canvas.width + 200) return;

        if (obj.type === 's') {
            ctx.fillStyle = "#ff2255"; ctx.beginPath(); ctx.moveTo(sx, GROUND_Y); ctx.lineTo(sx+25, GROUND_Y-50); ctx.lineTo(sx+50, GROUND_Y); ctx.fill();
            if (checkCollision(sx, 50, 50, GROUND_Y)) die();
        } else if (obj.type === 'o' && obj.active) {
            ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(sx+25, obj.y+25, 25, 0, Math.PI*2); ctx.fill();
            let dx = (player.x + 24) - (sx + 25); let dy = (player.y + 24) - (obj.y + 25);
            if (Math.sqrt(dx*dx + dy*dy) < 95 && bufferTimer > 0) { player.velY = -18; bufferTimer = 0; obj.active = false; }
        } else if (obj.type === 'b') {
            ctx.fillStyle = "#111"; ctx.fillRect(sx, obj.y, 52, 52); ctx.strokeStyle = "#00ffff"; ctx.strokeRect(sx, obj.y, 52, 52);
            checkBlockCollision(sx, obj.y);
        } else if (obj.type === 'p') {
            ctx.fillStyle = "#00ff00"; ctx.globalAlpha = 0.2; ctx.fillRect(sx, CEILING_Y, 70, GROUND_Y - CEILING_Y); ctx.globalAlpha = 1;
            if (Math.abs(player.x -
